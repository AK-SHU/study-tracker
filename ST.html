<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Study Planner</title>

<link rel="stylesheet" href="ST.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="card">
    <h3>Welcome</h3>
    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="login()">Enter</button>
</div>

<!-- MAIN APP -->
<div id="app" class="container" style="display:none;">

<h1>📅 Smart Study Planner</h1>
<p id="welcomeText"></p>

<button onclick="toggleDarkMode()">🌙 Dark Mode</button>

<!-- ADD TASK -->
<div class="card">
    <h3>Add Task</h3>
    <input type="text" id="taskInput" placeholder="Task">
    <input type="number" id="hoursInput" placeholder="Hours">
    <button onclick="addTask()">Add</button>
</div>

<!-- GOAL -->
<div class="card">
    <h3>🎯 Daily Goal</h3>
    <input type="number" id="goalInput" placeholder="Set goal">
    <button onclick="setGoal()">Set</button>
    <p>Goal: <span id="goal">0</span> hrs</p>
</div>

<!-- TASK LIST -->
<div class="card">
    <h3>📋 Tasks</h3>
    <ul id="taskList"></ul>
</div>

<!-- STATS -->
<div class="card stats">
    <p>🔥 Streak: <span id="streak">0</span></p>
    <p>📊 Hours: <span id="totalHours">0</span></p>
</div>

<!-- CHART -->
<div class="card">
    <h3>📈 Progress</h3>
    <canvas id="chart"></canvas>
</div>

<!-- TIMER -->
<div class="card timer">
    <h3>⏳ Pomodoro</h3>
    <p id="time">25:00</p>
    <button onclick="startTimer()">Start</button>
    <button onclick="resetTimer()">Reset</button>
</div>

</div>

<script src="ST.js"></script>
</body>
</html>
